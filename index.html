<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Speaking Gym – Eat Pray Love</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1e2d4a;--blue:#3b82f6;--blue-light:#dbeafe;--blue-soft:#eff6ff;
  --beige:#f5f0ea;--beige-mid:#e8e0d4;
  --green:#10b981;--green-light:#d1fae5;--green-dark:#065f46;
  --orange:#f97316;--orange-light:#ffedd5;
  --g100:#f1f5f9;--g200:#e2e8f0;--g400:#94a3b8;--g600:#475569;
  --card:#fff;--bg:#f7f8fa;--fs:15px;--hfs:19px;
}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--navy);}
.hdr{background:var(--navy);color:#fff;padding:9px 16px;display:flex;align-items:center;justify-content:space-between;}
.hdr-l{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.hdot{width:7px;height:7px;border-radius:50%;background:var(--blue);}
.hdr-r{font-size:11px;opacity:.4;}
.tabs{display:flex;background:var(--g100);border-radius:9px;padding:3px;gap:3px;width:100%;}
.tab{flex:1;padding:6px 0;border:none;background:transparent;border-radius:7px;font-size:13px;font-weight:500;color:var(--g600);cursor:pointer;transition:.13s;}
.tab.on{background:var(--card);color:var(--navy);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center;width:100%;}
.btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:.13s;white-space:nowrap;}
.btn.mode{background:var(--orange-light);color:var(--orange);}
.btn.mode.on{background:var(--orange);color:#fff;}
.btn.tr{background:var(--green-light);color:var(--green-dark);}
.btn.tr.on{background:var(--green-dark);color:#fff;}
.btn.lay{background:var(--navy);color:#fff;margin-left:auto;}
.btn.view{background:var(--g100);color:var(--g600);border:1px solid var(--g200);}
.btn.view.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn.fnt{background:var(--blue-light);color:var(--blue);}
.fpwrap{position:relative;}
.fpop{display:none;position:absolute;bottom:calc(100% + 8px);left:0;background:var(--card);border:1px solid var(--g200);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:10px;gap:7px;z-index:500;white-space:nowrap;flex-direction:column;}
.fpop.open{display:flex;}
.fplbl{font-size:11px;color:var(--g400);font-weight:600;letter-spacing:.05em;}
.fprow{display:flex;gap:6px;}
.fpo{padding:6px 12px;border-radius:7px;border:1.5px solid var(--g200);background:var(--g100);font-weight:600;cursor:pointer;transition:.12s;color:var(--navy);font-size:13px;}
.fpo:hover{border-color:var(--blue);color:var(--blue);}
.fpo.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.prog-wrap{display:flex;align-items:center;gap:10px;width:100%;}
.prog-circle{position:relative;width:46px;height:46px;flex-shrink:0;}
.prog-circle svg{transform:rotate(-90deg);}
.pbg{fill:none;stroke:var(--g200);stroke-width:4;}
.pfg{fill:none;stroke:var(--blue);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .5s;}
.pnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--blue);}
.prog-info{flex:1;}
.prog-lbl{font-size:11px;color:var(--g400);}
.prog-cnt{font-size:12px;font-weight:600;color:var(--navy);margin-top:1px;}
.prog-bar{height:4px;background:var(--g200);border-radius:99px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#818cf8);border-radius:99px;transition:width .5s;}
#vert{display:block;}
#vert.off{display:none;}
.vert-top{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--card);box-shadow:0 2px 10px rgba(0,0,0,.08);border-radius:0 0 18px 18px;}
.vert-top iframe{width:100%;height:200px;border:none;display:block;}
.vert-ctrl{padding:10px 12px 14px;display:flex;flex-direction:column;gap:8px;}
.sub-list{padding:8px 10px 30px;display:flex;flex-direction:column;gap:7px;}
.sc{background:var(--card);border-radius:13px;box-shadow:0 1px 4px rgba(0,0,0,.06);overflow:hidden;}
.sc.playing{animation:cpulse 1.4s ease-in-out infinite;}
@keyframes cpulse{0%,100%{box-shadow:0 0 0 2.5px var(--blue),0 4px 14px rgba(59,130,246,.15);}50%{box-shadow:0 0 0 4px var(--blue),0 6px 18px rgba(59,130,246,.3);}}
.sc.sel .spa{outline:2px solid var(--blue);outline-offset:1px;}
.sc.done{background:#f0fdf4;}
.sc-in{display:flex;align-items:stretch;}
.spa{flex:1;padding:11px 13px;cursor:pointer;text-align:left;background:transparent;border:none;line-height:1.45;word-break:break-word;}
.eng{display:block;font-size:var(--fs);font-weight:500;color:var(--navy);}
.sc.done .eng{color:var(--green-dark);text-decoration:line-through;}
.kwrap{overflow:hidden;max-height:0;transition:max-height .25s,margin-top .2s;}
.kwrap.open{max-height:60px;margin-top:5px;}
.kt{font-size:calc(var(--fs) - 3px);color:var(--g600);font-style:italic;display:block;padding-top:5px;border-top:1px solid var(--blue-light);}
.sc.done .kt{color:var(--green);border-top-color:#bbf7d0;}
.sacts{display:flex;flex-direction:column;border-left:1px solid var(--g100);flex-shrink:0;}
.sa{flex:1;width:42px;border:none;background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:background .12s;}
.sa:hover{background:var(--g100);}
.sa.chk{color:var(--green);}
.sa.hid{background:var(--g100);}
.sa:first-child{border-bottom:1px solid var(--g100);}
#horiz{display:none;}
#horiz.on{display:flex;flex-direction:row;height:calc(100vh - 38px);}
.h-left{width:40%;min-width:300px;max-width:480px;flex-shrink:0;background:var(--beige);border-right:1px solid var(--beige-mid);display:flex;flex-direction:column;overflow:hidden;}
.h-title{padding:14px 18px 12px;background:var(--card);border-bottom:1px solid var(--beige-mid);flex-shrink:0;}
.h-eye{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);margin-bottom:4px;}
.h-main{font-size:19px;font-weight:800;color:var(--navy);line-height:1.2;}
.h-sub{font-size:12px;color:var(--g400);margin-top:3px;}
.h-vid{flex:1;min-height:0;display:flex;align-items:center;padding:14px 16px;}
.h-vid iframe{width:100%;aspect-ratio:16/9;border:none;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.12);}
.h-now{margin:0 16px;background:var(--card);border:1.5px solid var(--blue-light);border-radius:12px;padding:12px 14px;flex-shrink:0;}
.h-now-lbl{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--blue);}
.h-now-txt{font-size:17px;font-weight:700;color:var(--navy);line-height:1.3;margin-top:4px;}
.h-now-txt.idle{color:var(--g400);font-size:13px;font-style:italic;font-weight:400;}
.h-now-kor{font-size:13px;color:var(--g400);font-style:italic;margin-top:3px;}
.h-ctrl{flex-shrink:0;padding:12px 16px 14px;background:var(--card);border-top:1px solid var(--beige-mid);display:flex;flex-direction:column;gap:8px;}
.h-prog{display:flex;align-items:center;gap:10px;}
.h-prog-bg{flex:1;height:5px;background:var(--g200);border-radius:99px;overflow:hidden;}
.h-prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),#818cf8);border-radius:99px;transition:width .5s;}
.h-prog-txt{font-size:12px;color:var(--g400);white-space:nowrap;}
.h-btns{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.hb{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:9px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:.13s;white-space:nowrap;}
.hb.mode{background:var(--orange-light);color:var(--orange);}
.hb.mode.on{background:var(--orange);color:#fff;}
.hb.tr{background:var(--green-light);color:var(--green-dark);}
.hb.tr.on{background:var(--green-dark);color:#fff;}
.hb.view{background:var(--g100);color:var(--g600);border:1px solid var(--g200);}
.hb.view.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.hb.lay{background:var(--navy);color:#fff;margin-left:auto;}
.hb.fnt{background:var(--blue-light);color:var(--blue);}
.h-right{flex:1;min-width:0;padding:10px 12px 24px;display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
.hrow{display:flex;align-items:center;gap:7px;border-radius:13px;}
.hrow.playing{animation:cpulse 1.4s ease-in-out infinite;}
.hrow.sel .hsb{outline:2.5px solid var(--blue);outline-offset:1px;}
.hsb{flex:1;min-width:0;padding:12px 15px;border-radius:13px;border:none;background:var(--card);text-align:left;cursor:pointer;transition:background .13s;line-height:1.45;word-break:break-word;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.hsb:hover{background:var(--blue-soft);}
.hsb.done{background:#f0fdf4;}
.h-eng{display:block;font-size:var(--hfs);font-weight:600;color:var(--navy);}
.hsb.done .h-eng{color:var(--green-dark);text-decoration:line-through;}
.hkwrap{overflow:hidden;max-height:0;transition:max-height .25s,margin-top .2s;}
.hkwrap.open{max-height:60px;margin-top:5px;}
.hkt{font-size:calc(var(--hfs) - 5px);color:var(--g400);font-style:italic;display:block;padding-top:5px;border-top:1px solid var(--blue-light);}
.hsb.done .hkt{color:var(--green);border-top-color:#bbf7d0;}
.hacts{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.ha{width:42px;height:42px;border:1px solid var(--g200);background:var(--card);border-radius:9px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:.12s;}
.ha:hover{background:var(--blue-soft);}
.ha.chk{color:var(--green);}
.ha.hid{background:var(--g100);}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-l"><div class="hdot"></div>Speaking Gym <span style="opacity:.45;font-weight:400;font-size:12px">with Noah</span></div>
  <div class="hdr-r">Eat Pray Love · I Have No Pulse</div>
</div>
<div id="vert">
  <div class="vert-top">
    <iframe id="pv" src="https://www.youtube.com/embed/OFE5qIFWyR4?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <div class="vert-ctrl">
      <div class="prog-wrap">
        <div class="prog-circle">
          <svg width="46" height="46" viewBox="0 0 46 46">
            <circle class="pbg" cx="23" cy="23" r="19"/>
            <circle class="pfg" id="pfg" cx="23" cy="23" r="19" stroke-dasharray="119.38" stroke-dashoffset="119.38"/>
          </svg>
          <div class="pnum" id="ppct">0%</div>
        </div>
        <div class="prog-info">
          <div class="prog-lbl">학습 진행률</div>
          <div class="prog-cnt" id="pcnt">0 / 59 문장</div>
          <div class="prog-bar"><div class="prog-fill" id="pbar" style="width:0%"></div></div>
        </div>
      </div>
      <div class="btns">
        <button class="btn mode" id="v-mode">▶ 한줄</button>
        <button class="btn tr" id="v-tr">번역</button>
        <div class="fpwrap">
          <button class="btn fnt" id="v-fnt">가 글자</button>
          <div class="fpop" id="fpop">
            <div class="fplbl">글자 크기</div>
            <div class="fprow">
              <button class="fpo" data-s="13">작게</button>
              <button class="fpo on" data-s="15">보통</button>
              <button class="fpo" data-s="18">크게</button>
              <button class="fpo" data-s="21">아주 크게</button>
            </div>
          </div>
        </div>
        <button class="btn" id="v-hide" onclick="toggleHideAll()">🙈 자막가리기</button>
        <button class="btn lay" id="v-lay">가로</button>
      </div>
    </div>
  </div>
  <div class="sub-list" id="sv"></div>
</div>
<div id="horiz">
  <div class="h-left">
    <div class="h-title">
      <div class="h-eye">Speaking Gym with Noah</div>
      <div class="h-main">Eat Pray Love</div>
      <div class="h-sub">I Have No Pulse</div>
    </div>
    <div class="h-vid">
      <iframe id="ph" src="https://www.youtube.com/embed/OFE5qIFWyR4?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="h-ctrl">
      <div class="h-prog">
        <div class="h-prog-bg"><div class="h-prog-fill" id="hpbar" style="width:0%"></div></div>
        <div class="h-prog-txt" id="hptxt">0%</div>
      </div>
      <div class="h-btns">
        <button class="hb mode" id="h-mode">▶ 한줄</button>
        <button class="hb tr" id="h-tr">번역</button>
        <div class="fpwrap">
          <button class="hb fnt" id="h-fnt">가 글자</button>
          <div class="fpop" id="h-fpop">
            <div class="fplbl">글자 크기</div>
            <div class="fprow">
              <button class="h-fpo fpo" data-s="15">작게</button>
              <button class="h-fpo fpo on" data-s="19">보통</button>
              <button class="h-fpo fpo" data-s="23">크게</button>
              <button class="h-fpo fpo" data-s="27">아주 크게</button>
            </div>
          </div>
        </div>
        <button class="hb" id="h-hide" onclick="toggleHideAll()">🙈 자막가리기</button>
        <button class="hb lay" id="h-lay">세로</button>
      </div>
    </div>
  </div>
  <div class="h-right" id="sh"></div>
</div>
<script>
const SUBS=[
  {
    "start": 23.403,
    "end": 24.9,
    "text": "You wanna go away for a year?",
    "kor": "일 년 동안 떠나고 싶다고?"
  },
  {
    "start": 25.218,
    "end": 27.18,
    "text": "Do you know what I felt when I woke up, Delia?",
    "kor": "딜리아, 오늘 아침에 일어났을 때 무슨 느낌이었는지 알아?"
  },
  {
    "start": 27.31,
    "end": 27.897,
    "text": "Nothing.",
    "kor": "아무것도 없었어."
  },
  {
    "start": 27.908,
    "end": 32.04,
    "text": "No passion, no spark, no faith, no heat. Absolutely nothing.",
    "kor": "열정도, 불꽃도, 믿음도, 열기도 없었어. 아무것도."
  },
  {
    "start": 32.192,
    "end": 35.31,
    "text": "I think I've really gotten past the point where I can be calling this a bad moment.",
    "kor": "이걸 그냥 힘든 순간이라고 부를 수 있는 단계는 정말 넘어선 것 같아."
  },
  {
    "start": 35.552,
    "end": 37.116,
    "text": "And it just it terrifies me.",
    "kor": "그게 그냥 너무 두려워."
  },
  {
    "start": 37.127,
    "end": 39.57,
    "text": "I mean Jesus, this is like worse than death to me... the idea",
    "kor": "세상에, 이건 나한테 죽음보다 더 나쁜 것 같아... 이 생각이."
  },
  {
    "start": 39.75,
    "end": 41.746,
    "text": "this is the person I'm gonna be from now on.",
    "kor": "이게 앞으로 내가 될 사람이라는 게."
  },
  {
    "start": 41.757,
    "end": 43.32,
    "text": "You know what? This happens to people.",
    "kor": "있잖아? 이런 일은 누구에게나 생겨."
  },
  {
    "start": 43.392,
    "end": 45.405,
    "text": "They fall in love in their 20s, get married",
    "kor": "20대에 사랑에 빠지고, 결혼하고,"
  },
  {
    "start": 45.416,
    "end": 48.3,
    "text": "do the granite countertop, white-picket fence in their 30s.",
    "kor": "30대에 화강암 조리대에 하얀 울타리 두른 집 마련하고."
  },
  {
    "start": 48.54,
    "end": 51.33,
    "text": "and somewhere they realize, \"This is not for me anymore.\"",
    "kor": "그러다 어느 순간 \"이건 더 이상 나한테 맞지 않아\"라고 깨닫지."
  },
  {
    "start": 51.6,
    "end": 53.179,
    "text": "So they fail and they fall down,",
    "kor": "그래서 실패하고 쓰러지고,"
  },
  {
    "start": 53.19,
    "end": 54.928,
    "text": "they hurt like hell, they straighten up...",
    "kor": "엄청 아프지만 정신 차리고..."
  },
  {
    "start": 54.939,
    "end": 57.27,
    "text": "and march their bruised asses to the shrink's office.",
    "kor": "멍든 몸을 이끌고 정신과에 가는 거야."
  },
  {
    "start": 57.53,
    "end": 59.051,
    "text": "They can't just check out.",
    "kor": "그냥 포기할 순 없잖아."
  },
  {
    "start": 59.062,
    "end": 61.08,
    "text": "I am not checking out.",
    "kor": "나는 포기하는 게 아니야."
  },
  {
    "start": 61.26,
    "end": 62.947,
    "text": "I need to change.",
    "kor": "변화가 필요해."
  },
  {
    "start": 62.958,
    "end": 65.04,
    "text": "You have a support system here, Liz.",
    "kor": "리즈, 여기 버팀목이 있잖아."
  },
  {
    "start": 65.19,
    "end": 67.03,
    "text": "You have friends and family who love you.",
    "kor": "너를 사랑하는 친구들이랑 가족이 있고."
  },
  {
    "start": 67.04,
    "end": 68.88,
    "text": "And do you feel my love for you?",
    "kor": "내 사랑도 느껴지지?"
  },
  {
    "start": 69.15,
    "end": 70.41,
    "text": "My support for you?",
    "kor": "내 응원도?"
  },
  {
    "start": 70.56,
    "end": 72.12,
    "text": "No. There's, like, nothing.",
    "kor": "아니. 아무것도 없는 것 같아."
  },
  {
    "start": 72.3,
    "end": 73.63,
    "text": "I have no pulse.",
    "kor": "맥박이 없어."
  },
  {
    "start": 76.26,
    "end": 77.28,
    "text": "I am going to Italy.",
    "kor": "나 이탈리아 갈 거야."
  },
  {
    "start": 77.52,
    "end": 78.869,
    "text": "Italy. Why Italy?",
    "kor": "이탈리아. 왜 이탈리아야?"
  },
  {
    "start": 78.88,
    "end": 80.165,
    "text": "What did you have for lunch?",
    "kor": "오늘 점심 뭐 먹었어?"
  },
  {
    "start": 80.175,
    "end": 81.254,
    "text": "I don't know. A salad.",
    "kor": "모르겠어. 샐러드."
  },
  {
    "start": 81.278,
    "end": 82.33,
    "text": "Exactly.",
    "kor": "바로 그거야."
  },
  {
    "start": 82.44,
    "end": 85.89,
    "text": "I used to have this appetite for food",
    "kor": "나 예전엔 음식에 대한 열정이 있었는데,"
  },
  {
    "start": 86.04,
    "end": 87.825,
    "text": "for my life and it, it's just gone.",
    "kor": "삶에 대한 열정도 있었는데, 그게 그냥 사라졌어."
  },
  {
    "start": 89.58,
    "end": 93.52,
    "text": "I wanna go someplace where I can marvel at something.",
    "kor": "뭔가에 경이로움을 느낄 수 있는 곳에 가고 싶어."
  },
  {
    "start": 93.9,
    "end": 97.17,
    "text": "Language, gelato, spaghetti, something.",
    "kor": "언어, 젤라토, 스파게티, 뭐든."
  },
  {
    "start": 97.59,
    "end": 99.21,
    "text": "You're talking like a college kid.",

const KEY='sg_'+btoa('OFE5qIFWyR4').slice(0,8);
let st={},showKor=false,openK=new Set();
let playing=null,paused=false,pausedIdx=null,playMode='single',tid=null;
let pv,ph,view='all',selIdx=null,fs=15,hfs=19,layout='vert';
function load(){try{const s=JSON.parse(localStorage.getItem(KEY))||{};st=s.st||{};fs=s.fs||15;hfs=s.hfs||19;for(let i=0;i<SUBS.length;i++)if(!st[i])st[i]={h:false,l:false};}catch{st={};}}
function save(){localStorage.setItem(KEY,JSON.stringify({st,fs,hfs}));}
function applyHfs(n){
  hfs=n;document.documentElement.style.setProperty('--hfs',n+'px');
  document.querySelectorAll('.h-fpo').forEach(b=>b.classList.toggle('on',+b.dataset.s===n));
  save();
}
function applyFs(n){fs=n;document.documentElement.style.setProperty('--fs',n+'px');document.querySelectorAll('.fpo').forEach(b=>b.classList.toggle('on',+b.dataset.s===n));save();}
function toggleHideAll(){
  const allHidden=Object.values(st).every(s=>s.h);
  Object.keys(st).forEach(k=>st[k].h=!allHidden);
  ['v-hide','h-hide'].forEach(id=>{
    const btn=document.getElementById(id);
    if(btn)btn.textContent=allHidden?'🙈 자막가리기':'👁 자막열기';
  });
  save();
  layout==='horiz'?renderH():renderV();
}
function prog(){const ld=Object.values(st).filter(s=>s.l).length,tot=SUBS.length;const p=tot?Math.round(ld/tot*100):0,c=2*Math.PI*19;const fg=document.getElementById('pfg');if(fg)fg.style.strokeDashoffset=c*(1-p/100);const g=id=>document.getElementById(id);if(g('ppct'))g('ppct').textContent=p+'%';if(g('pcnt'))g('pcnt').textContent=ld+' / '+tot+' 문장';if(g('pbar'))g('pbar').style.width=p+'%';if(g('hpbar'))g('hpbar').style.width=p+'%';if(g('hptxt'))g('hptxt').textContent=p+'% ('+ld+'/'+tot+')';}
function nowPlaying(idx){const t=document.getElementById('h-txt'),k=document.getElementById('h-kor');if(!t)return;if(idx===null){t.textContent='자막을 클릭해서 시작하세요';t.classList.add('idle');if(k)k.style.display='none';return;}t.textContent=SUBS[idx].text;t.classList.remove('idle');if(k){if(showKor){k.textContent=SUBS[idx].kor;k.style.display='';}else k.style.display='none';}}
function renderV(v){view=v||view;const div=document.getElementById('sv');div.innerHTML='';SUBS.forEach((sub,i)=>{if(view==='done'&&!st[i].l)return;const card=document.createElement('div');card.className='sc'+(i===playing?' playing':'')+(i===selIdx?' sel':'')+(st[i].l?' done':'');card.dataset.i=i;const inn=document.createElement('div');inn.className='sc-in';const pb=document.createElement('button');pb.className='spa';const es=document.createElement('span');es.className='eng';es.textContent=st[i].h?'🙈':sub.text;pb.appendChild(es);const kw=document.createElement('span');kw.className='kwrap'+(openK.has(i)?' open':'');const ks=document.createElement('span');ks.className='kt';if(showKor)ks.textContent=sub.kor;kw.appendChild(ks);pb.appendChild(kw);pb.onclick=()=>{if(showKor&&!st[i].h){openK.has(i)?openK.delete(i):openK.add(i);}doPlay(i,'v');};const acts=document.createElement('div');acts.className='sacts';const hb=document.createElement('button');hb.className='sa'+(st[i].h?' hid':'');hb.textContent='🙈';hb.onclick=e=>{e.stopPropagation();st[i].h=!st[i].h;save();renderV();};const cb=document.createElement('button');cb.className='sa'+(st[i].l?' chk':'');cb.textContent='✔';cb.onclick=e=>{e.stopPropagation();st[i].l=!st[i].l;save();renderV();prog();};acts.appendChild(hb);acts.appendChild(cb);inn.appendChild(pb);inn.appendChild(acts);card.appendChild(inn);div.appendChild(card);});prog();}
function renderH(v){view=v||view;const div=document.getElementById('sh');div.innerHTML='';SUBS.forEach((sub,i)=>{if(view==='done'&&!st[i].l)return;const row=document.createElement('div');row.className='hrow'+(i===playing?' playing':'')+(i===selIdx?' sel':'');row.dataset.i=i;const btn=document.createElement('button');btn.className='hsb'+(st[i].l?' done':'');const eng=document.createElement('span');eng.className='h-eng';eng.textContent=st[i].h?'🙈':sub.text;btn.appendChild(eng);const kw=document.createElement('span');kw.className='hkwrap'+(openK.has(i)?' open':'');const ks=document.createElement('span');ks.className='hkt';if(showKor)ks.textContent=sub.kor;kw.appendChild(ks);btn.appendChild(kw);btn.onclick=()=>{if(showKor&&!st[i].h){openK.has(i)?openK.delete(i):openK.add(i);}doPlay(i,'h');};const acts=document.createElement('div');acts.className='hacts';const hb=document.createElement('button');hb.className='ha'+(st[i].h?' hid':'');hb.textContent='🙈';hb.onclick=e=>{e.stopPropagation();st[i].h=!st[i].h;save();renderH();};const cb=document.createElement('button');cb.className='ha'+(st[i].l?' chk':'');cb.textContent='✔';cb.onclick=e=>{e.stopPropagation();st[i].l=!st[i].l;save();renderH();prog();};acts.appendChild(hb);acts.appendChild(cb);row.appendChild(btn);row.appendChild(acts);div.appendChild(row);});prog();}
function scrollTo(i,m){
  const id=m==='v'?'sv':'sh';
  const container=document.getElementById(id);
  const row=container?.querySelector('[data-i="'+i+'"]');
  if(!row)return;
  if(m==='h'){row.scrollIntoView({behavior:'smooth',block:'center'});return;}
  // 학생 모드: sticky 헤더 높이 계산해서 두 번째 줄 위치에 오도록 스크롤
  const top=document.querySelector('.vert-top');
  const headerH=top?top.offsetHeight:0;
  const rowTop=row.getBoundingClientRect().top+window.scrollY;
  const offset=rowTop-headerH-8;
  window.scrollTo({top:offset,behavior:'smooth'});
}
function doPlay(i,m){selIdx=i;const cp=m==='v'?pv:ph;const re=m==='v'?renderV:renderH;re();if(!cp?.seekTo)return;const s=cp.getPlayerState();if(playing!==i){startPlay(i,m);return;}if(s===1){cp.pauseVideo();if(tid)clearTimeout(tid);paused=true;pausedIdx=i;playing=null;re();return;}if(s===2&&paused&&pausedIdx===i){startPlay(i,m);return;}startPlay(i,m);}
function startPlay(i,m){playing=i;paused=false;pausedIdx=null;const re=m==='v'?renderV:renderH;re();scrollTo(i,m);const cp=m==='v'?pv:ph;const s=SUBS[i].start,e=playMode==='single'?SUBS[i].end:(SUBS[i+1]?SUBS[i+1].end:SUBS[i].end);cp.seekTo(s,true);cp.playVideo();if(tid)clearTimeout(tid);tid=setTimeout(()=>{cp.pauseVideo();playing=null;re();},(e-s)*1000);}
function toggleTr(m){showKor=!showKor;if(!showKor)openK.clear();const lbl=showKor?'번역 ✓':'번역';['v-tr','h-tr'].forEach(id=>{const b=document.getElementById(id);if(b){b.textContent=lbl;b.classList.toggle('on',showKor);}});layout==='vert'?renderV():renderH();}
function setLayout(m){layout=m;document.getElementById('vert').classList.toggle('off',m==='horiz');document.getElementById('horiz').classList.toggle('on',m==='horiz');m==='horiz'?renderH():renderV();}
function syncMode(){const lbl=playMode==='single'?'▶ 한줄':'▶▶ 두줄';['v-mode','h-mode'].forEach(id=>{const b=document.getElementById(id);if(b){b.textContent=lbl;b.classList.toggle('on',playMode==='next');}});}
window.onYouTubeIframeAPIReady=function(){pv=new YT.Player('pv');ph=new YT.Player('ph');};
window.onload=function(){
  function setSubPadding(){const h=document.querySelector('.vert-top')?.offsetHeight||0;const sv=document.getElementById('sv');if(sv)sv.style.paddingTop=(h+8)+'px';}
  setSubPadding();window.addEventListener('resize',setSubPadding);
  load();applyFs(fs);applyHfs(hfs);
  // 세로모드 버튼
  document.getElementById('v-mode').onclick=()=>{playMode=playMode==='single'?'next':'single';syncMode();};
  document.getElementById('v-tr').onclick=()=>toggleTr('v');
  document.getElementById('v-lay').onclick=()=>setLayout('horiz');
  document.getElementById('v-fnt').onclick=e=>{e.stopPropagation();document.getElementById('fpop').classList.toggle('open');};
  document.querySelectorAll('.fpo').forEach(b=>b.onclick=e=>{e.stopPropagation();applyFs(+b.dataset.s);renderV();document.getElementById('fpop').classList.remove('open');});
  // 가로모드 버튼
  document.getElementById('h-mode').onclick=()=>{playMode=playMode==='single'?'next':'single';syncMode();};
  document.getElementById('h-tr').onclick=()=>toggleTr('h');
  document.getElementById('h-lay').onclick=()=>setLayout('vert');
  document.addEventListener('click',()=>{document.getElementById('fpop').classList.remove('open');document.getElementById('h-fpop')?.classList.remove('open');});
  document.getElementById('h-fnt').onclick=e=>{e.stopPropagation();document.getElementById('h-fpop').classList.toggle('open');};
  document.querySelectorAll('.h-fpo').forEach(b=>b.onclick=e=>{e.stopPropagation();applyHfs(+b.dataset.s);renderH();document.getElementById('h-fpop').classList.remove('open');});renderV();const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.body.appendChild(tag);};
</script>
